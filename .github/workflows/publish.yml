name: Publish

# Publishes exactly one package per run, determined by target_package.
# - node-liblzma: checkout by tag, download prebuilds, build WASM, publish root
# - tar-xz:       checkout master HEAD, build TS, publish packages/tar-xz
# - nxz-cli:      checkout master HEAD, build TS, publish packages/nxz
#
# Each package manages its own version; there is no cross-package version sync.

on:
  workflow_call:
    inputs:
      tag:
        description: 'Git tag to publish (required for node-liblzma; omit for workspace packages)'
        required: false
        type: string
        default: ''
      target_package:
        description: 'Which package to publish'
        type: string
        default: 'node-liblzma'
      skip_npm:
        description: 'Skip npm publish'
        type: boolean
        default: false
      npm_tag:
        description: 'npm dist-tag (e.g. "v3", "legacy"). Auto-detected if omitted.'
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g. v2.0.1) — required for node-liblzma; leave empty for workspace packages'
        required: false
        type: string
        default: ''
      target_package:
        description: 'Which package to publish'
        type: choice
        required: true
        default: node-liblzma
        options:
          - node-liblzma
          - tar-xz
          - nxz-cli
      skip_npm:
        description: 'Skip npm publish (for testing)'
        type: boolean
        default: false
      npm_tag:
        description: 'npm dist-tag (e.g. "v3", "legacy"). Auto-detected if omitted.'
        type: string
        default: ''

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: '24'  # Required for npm OIDC trusted publishing (npm >= 11.5.1)

jobs:
  # ── Resolve the checkout ref ──────────────────────────────────────────────
  # For node-liblzma: normalize the tag (add 'v' prefix if missing).
  # For workspace packages: no tag is used; we always publish from master HEAD.
  normalize-ref:
    name: Resolve checkout ref
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - name: Resolve ref
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.tag }}
          TARGET: ${{ inputs.target_package }}
        run: |
          if [ "$TARGET" = "node-liblzma" ]; then
            TAG="${INPUT_TAG:-${GITHUB_REF_NAME}}"
            # Add 'v' prefix if missing
            if [[ ! "$TAG" =~ ^v ]]; then
              TAG="v$TAG"
              echo "Added 'v' prefix: $TAG"
            fi
            echo "ref=${TAG}" >> "$GITHUB_OUTPUT"
          else
            # Workspace packages are always published from master HEAD
            echo "ref=master" >> "$GITHUB_OUTPUT"
          fi

  publish:
    runs-on: ubuntu-latest
    needs: normalize-ref
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.normalize-ref.outputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # ── node-liblzma only: download prebuilt native binaries ───────────────
      - name: Download prebuilds from GitHub Release
        if: inputs.target_package == 'node-liblzma'
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ needs.normalize-ref.outputs.ref }}
          fileName: '*.tar.gz'
          out-file-path: 'release-assets'

      - name: Extract and verify prebuilds
        if: inputs.target_package == 'node-liblzma'
        run: |
          mkdir -p prebuilds

          for archive in release-assets/*.tar.gz; do
            echo "Extracting $(basename "$archive")"
            tar xzf "$archive" -C prebuilds/
          done

          if [ ! "$(find prebuilds -name '*.node' -type f)" ]; then
            echo "No prebuilds found after extraction" >&2
            exit 1
          fi

          echo "Prebuilds structure:"
          find prebuilds -name '*.node' -type f

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── node-liblzma only: build WASM bindings ─────────────────────────────
      - name: Download XZ sources
        if: inputs.target_package == 'node-liblzma'
        run: |
          set -e
          VERSION=$(jq -r '.version' xz-version.json)
          echo "XZ version needed: $VERSION"
          python3 scripts/download_xz_from_github.py deps/xz.tar.gz deps/
          echo "XZ $VERSION downloaded"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Emscripten
        if: inputs.target_package == 'node-liblzma'
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: 3.1.51

      - name: Build WASM bindings
        if: inputs.target_package == 'node-liblzma'
        run: pnpm build:wasm

      # ── All targets: build TypeScript ──────────────────────────────────────
      # Always build root + all workspace packages — avoids edge cases where a
      # workspace package's build output depends on root lib/.
      - name: Build TypeScript
        run: pnpm build && pnpm -r --filter './packages/*' run build

      # ── node-liblzma only: verify WASM artifacts ───────────────────────────
      - name: Verify WASM artifacts in lib/
        if: inputs.target_package == 'node-liblzma'
        run: |
          for f in lib/wasm/liblzma.js lib/wasm/liblzma.wasm; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f" >&2
              exit 1
            fi
            echo "$f ($(wc -c < "$f") bytes)"
          done

      # ── Publish: exactly one package per run ───────────────────────────────

      - name: Publish node-liblzma to npm with provenance
        if: inputs.target_package == 'node-liblzma' && inputs.skip_npm != true
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "node-liblzma@${VERSION}" version 2>/dev/null; then
            echo "node-liblzma@${VERSION} already published, skipping"
          else
            TAG_FLAG=""
            if [ -n "$NPM_TAG" ]; then
              TAG_FLAG="--tag $NPM_TAG"
            fi
            npm publish --provenance --access public $TAG_FLAG
          fi

      - name: Publish tar-xz to npm with provenance
        if: inputs.target_package == 'tar-xz' && inputs.skip_npm != true
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
          PKG_DIR: packages/tar-xz
        run: |
          PKG_NAME=$(node -p "require('./${PKG_DIR}/package.json').name")
          PKG_VERSION=$(node -p "require('./${PKG_DIR}/package.json').version")

          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
            echo "${PKG_NAME}@${PKG_VERSION} already published, skipping"
          else
            echo "Publishing ${PKG_NAME}@${PKG_VERSION}"
            # pnpm pack resolves workspace: protocols in the tarball
            TARBALL_PATH=$(cd "$PKG_DIR" && pnpm pack --pack-destination /tmp 2>/dev/null | tail -1)
            echo "Tarball: ${TARBALL_PATH}"
            TAG_FLAG=""
            if [ -n "$NPM_TAG" ]; then
              TAG_FLAG="--tag $NPM_TAG"
            fi
            npm publish "${TARBALL_PATH}" --provenance --access public $TAG_FLAG
          fi

      - name: Publish nxz-cli to npm with provenance
        if: inputs.target_package == 'nxz-cli' && inputs.skip_npm != true
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
          PKG_DIR: packages/nxz
        run: |
          PKG_NAME=$(node -p "require('./${PKG_DIR}/package.json').name")
          PKG_VERSION=$(node -p "require('./${PKG_DIR}/package.json').version")

          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
            echo "${PKG_NAME}@${PKG_VERSION} already published, skipping"
          else
            echo "Publishing ${PKG_NAME}@${PKG_VERSION}"
            # pnpm pack resolves workspace: protocols in the tarball
            TARBALL_PATH=$(cd "$PKG_DIR" && pnpm pack --pack-destination /tmp 2>/dev/null | tail -1)
            echo "Tarball: ${TARBALL_PATH}"
            TAG_FLAG=""
            if [ -n "$NPM_TAG" ]; then
              TAG_FLAG="--tag $NPM_TAG"
            fi
            npm publish "${TARBALL_PATH}" --provenance --access public $TAG_FLAG
          fi

      - name: Summarize
        env:
          TARGET: ${{ inputs.target_package }}
          REF: ${{ needs.normalize-ref.outputs.ref }}
        run: |
          echo "## Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Target**: ${TARGET}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Ref**: ${REF}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Package published" >> "$GITHUB_STEP_SUMMARY"
          case "$TARGET" in
            node-liblzma)
              VERSION=$(node -p "require('./package.json').version")
              echo "- node-liblzma@${VERSION}" >> "$GITHUB_STEP_SUMMARY"
              ;;
            tar-xz)
              VERSION=$(node -p "require('./packages/tar-xz/package.json').version")
              echo "- tar-xz@${VERSION}" >> "$GITHUB_STEP_SUMMARY"
              ;;
            nxz-cli)
              VERSION=$(node -p "require('./packages/nxz/package.json').version")
              echo "- nxz-cli@${VERSION}" >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac
