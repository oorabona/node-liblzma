name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    paths-ignore:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '**.md'
      - 'docs/**'
      - 'demo/**'
      - 'examples/**'
      - '.github/dependabot.yml'
  schedule:
    - cron: '0 0 * * 0'  # Weekly, Sunday 00:00 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      security-events: write
      packages: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language:
          - actions
          - c-cpp
          - javascript-typescript
          - python

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        if: matrix.language == 'javascript-typescript' || matrix.language == 'c-cpp'
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        if: matrix.language == 'javascript-typescript' || matrix.language == 'c-cpp'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python (for XZ download)
        if: matrix.language == 'c-cpp'
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Download XZ sources
        if: matrix.language == 'c-cpp'
        run: python scripts/download_xz_from_github.py deps/xz.tar.gz deps/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies (skip scripts)
        if: matrix.language == 'javascript-typescript'
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Install node-gyp globally (c-cpp)
        # pnpm doesn't bundle node-gyp; install it so the `gypfile: true` auto-rebuild works.
        if: matrix.language == 'c-cpp'
        run: npm install -g node-gyp

      - name: Build native binding (c-cpp)
        # CodeQL wraps the compiler: install must happen between init and analyze.
        # `pnpm install` triggers postinstall → node-gyp-build → node-gyp rebuild (compiles from source).
        if: matrix.language == 'c-cpp'
        run: pnpm install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
