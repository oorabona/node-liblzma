name: Changesets - Version PR

# When changesets are present on master, this workflow opens (or updates)
# a "Version Packages" PR that consumes them: bumps versions, regenerates
# CHANGELOG.md per package, and removes the .changeset/*.md files.
#
# Merging that PR brings the version bumps and changelogs to master.
# Actual npm publication is handled separately via .github/workflows/publish.yml
# (kept manual so we can build native prebuilds for node-liblzma when needed).

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: changesets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Version Packages
    runs-on: ubuntu-latest
    # Skip when the push itself is the "Version Packages" merge commit
    # (avoids the action creating an empty Version PR after we've just merged one).
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open / update Version PR
        uses: changesets/action@v1
        with:
          # Generates the "chore: version packages" commit on a managed branch
          version: pnpm exec changeset version
          commit: 'chore: version packages'
          title: 'chore: version packages'
          # No `publish:` — npm publication is handled by publish.yml
          # (manual trigger; lets us coordinate native prebuilds for node-liblzma)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
