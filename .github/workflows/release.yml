name: Release

# Supports independent versioning for each workspace package.
# - node-liblzma: full flow (bump root, GPG-signed tag, GitHub Release, prebuilds, npm publish)
# - tar-xz / nxz-cli: lightweight flow (bump workspace package.json, CHANGELOG commit, npm publish; no tag, no prebuilds)

on:
  workflow_dispatch:
    inputs:
      increment:
        description: 'Semver increment (patch, minor, major)'
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      target_package:
        description: 'Which package to release'
        type: choice
        required: true
        default: node-liblzma
        options:
          - node-liblzma
          - tar-xz
          - nxz-cli
      skip_npm:
        description: 'Skip npm publish (dry run)'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:
  release:
    name: Bump, changelog, tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ref.outputs.tag }}
      target: ${{ inputs.target_package }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_config_global: true

      - name: Set git committer identity
        run: |
          git config --global user.name "Olivier ORABONA"
          git config --global user.email "oorabona@users.noreply.github.com"

      # ── node-liblzma: bump root package.json ───────────────────────────────
      - name: Bump root version and update CHANGELOG (node-liblzma)
        if: inputs.target_package == 'node-liblzma'
        env:
          INCREMENT: ${{ inputs.increment }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm release-it-preset default \
            --no-git.push --no-git.tag \
            --no-github.release --no-npm.publish \
            --ci --increment "$INCREMENT"

      # ── workspace packages: bump the sub-package's package.json ────────────
      - name: Bump workspace version and update CHANGELOG (tar-xz or nxz-cli)
        if: inputs.target_package != 'node-liblzma'
        env:
          INCREMENT: ${{ inputs.increment }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Resolve package directory from target name
          PKG_DIR: ${{ inputs.target_package == 'tar-xz' && 'packages/tar-xz' || 'packages/nxz' }}
          PKG_NAME: ${{ inputs.target_package }}
        run: |
          cd "$PKG_DIR"
          # Scope CHANGELOG to commits touching only this package subtree via GIT_CHANGELOG_PATH (release-it-preset v0.11.0+)
          GIT_CHANGELOG_PATH=. pnpm exec release-it-preset default \
            --no-git.tag --no-git.push \
            --no-github.release --no-npm.publish \
            --ci --increment "$INCREMENT"
          cd "$GITHUB_WORKSPACE"
          # release-it already committed the version bump + CHANGELOG; push to master
          git push origin master

      # ── node-liblzma only: GPG-sign the tag and push ───────────────────────
      - name: Create GPG-signed tag and push (node-liblzma)
        id: version
        if: inputs.target_package == 'node-liblzma'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          git tag -s "$TAG" -m "Release $TAG"
          git push origin master --tags

      # ── node-liblzma only: create GitHub Release ───────────────────────────
      - name: Create GitHub Release (node-liblzma)
        if: inputs.target_package == 'node-liblzma'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true

      # ── Compute publish ref for downstream jobs ────────────────────────────
      # For node-liblzma: tag = "vX.Y.Z" (publish.yml will checkout that tag)
      # For workspace packages: tag = "" (publish.yml will checkout master HEAD)
      - name: Compute publish ref
        id: ref
        env:
          TARGET: ${{ inputs.target_package }}
        run: |
          if [ "$TARGET" = "node-liblzma" ]; then
            TAG="v$(node -p "require('./package.json').version")"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          else
            # No git tag for workspace packages; publish.yml will use master HEAD
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Summarize
        env:
          TAG: ${{ steps.ref.outputs.tag }}
          INCREMENT: ${{ inputs.increment }}
          TARGET: ${{ inputs.target_package }}
        run: |
          echo "## Release: ${TARGET}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Increment**: ${INCREMENT}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$TAG" ]; then
            echo "**Tag**: ${TAG} (GPG-signed)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Tag**: none (workspace package — commit pushed to master)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "**CHANGELOG**: updated from conventional commits" >> "$GITHUB_STEP_SUMMARY"

  # ── Prebuild native binaries — only needed for node-liblzma ──────────────
  build:
    name: Build Prebuilds
    needs: release
    # Only the native node-liblzma package requires prebuilt binaries
    if: inputs.target_package == 'node-liblzma'
    uses: ./.github/workflows/build-artifacts.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets: inherit

  # ── Trigger npm publish ───────────────────────────────────────────────────
  # For node-liblzma: wait for prebuilds (needs [release, build]).
  # For workspace packages: build job is skipped, but GitHub Actions treats
  # a skipped needed job as success — so this job still runs.
  publish:
    name: Publish to npm
    needs: [release, build]
    # always() so a skipped build (workspace target) doesn't auto-skip publish.
    # We still gate on release succeeding and skip_npm being false.
    if: ${{ always() && needs.release.result == 'success' && inputs.skip_npm != true }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger publish workflow (node-liblzma — includes tag)
        if: needs.release.outputs.target == 'node-liblzma'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          gh workflow run publish.yml \
            -R "$REPO" \
            -f tag="$TAG" \
            -f target_package="node-liblzma"
          echo "Publish workflow triggered for $TAG (node-liblzma)"

      - name: Trigger publish workflow (workspace package — no tag)
        if: needs.release.outputs.target != 'node-liblzma'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ needs.release.outputs.target }}
          REPO: ${{ github.repository }}
        run: |
          gh workflow run publish.yml \
            -R "$REPO" \
            -f target_package="$TARGET"
          echo "Publish workflow triggered for $TARGET (master HEAD)"
